<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Administratora | ALGO</title>
</head>
<body>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.registerPreviewStyle('/admin/preview.css');

    var CennikPreview = function(props) {
      var entry = props.entry;
      var kategorie = entry.getIn(['data', 'kategorie']);
      if (!kategorie) {
        return h('p', { style: { color: 'rgba(245,232,192,.4)', padding: '20px', fontStyle: 'italic' } },
          'Zapisz zmiany, aby zobaczyć podgląd.');
      }
      var kat = kategorie.toJS ? kategorie.toJS() : [];
      var activeIdx = 0;

      return h('div', {},
        // Category tabs
        h('div', { className: 'pcats' },
          kat.map(function(k, i) {
            return h('div', { key: i, className: 'pcb' + (i === activeIdx ? ' active' : '') }, k.nazwa || '—');
          })
        ),
        // Active category table
        kat.length > 0 && h('div', {},
          h('div', { className: 'cat-label' }, kat[activeIdx] ? kat[activeIdx].nazwa : ''),
          h('table', { className: 'ptab' },
            h('thead', {},
              h('tr', {},
                h('th', {}, (kat[activeIdx] && kat[activeIdx].naglowek) || 'Zabieg'),
                h('th', {}, 'Cena od')
              )
            ),
            h('tbody', {},
              (function() {
                var zabiegi = (kat[activeIdx] && kat[activeIdx].zabiegi) || [];
                if (!zabiegi.length) {
                  return h('tr', {}, h('td', { className: 'empty', colSpan: 2 }, 'Brak zabiegów — dodaj pierwszy zabieg po lewej.'));
                }
                return zabiegi.map(function(z, j) {
                  return h('tr', { key: j },
                    h('td', {}, z.nazwa || '—'),
                    h('td', {}, z.cena || '—')
                  );
                });
              })()
            )
          ),
          h('p', { className: 'pnote' }, 'Skontaktuj się z nami: 18 352 25 64')
        )
      );
    };

    CMS.registerPreviewTemplate('cennik', CennikPreview);
  </script>
</body>
</html>
