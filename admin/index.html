<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Admina | ALGO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0A0700;
      --bg2: #110D00;
      --gold: #C9A84C;
      --gold-dim: rgba(184,134,11,.3);
      --text: #F5E8C0;
      --text-dim: rgba(245,232,192,.5);
      --red: #c0392b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .login-box {
      width: 100%;
      max-width: 420px;
      border: 1px solid var(--gold-dim);
      padding: 3rem 2.5rem;
      background: var(--bg2);
    }

    .login-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: .25em;
      color: var(--gold);
      text-align: center;
      margin-bottom: .25rem;
    }

    .login-sub {
      text-align: center;
      font-size: .75rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 2.5rem;
    }

    .login-box label {
      display: block;
      font-size: .7rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: .5rem;
    }

    .login-box input[type="password"] {
      width: 100%;
      background: transparent;
      border: 1px solid var(--gold-dim);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: .9rem;
      padding: .75rem 1rem;
      outline: none;
      transition: border-color .2s;
    }

    .login-box input[type="password"]:focus {
      border-color: var(--gold);
    }

    .btn-gold {
      display: block;
      width: 100%;
      margin-top: 1.5rem;
      padding: .85rem 1rem;
      background: var(--gold);
      color: var(--bg);
      font-family: 'Jost', sans-serif;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .15em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: opacity .2s;
    }

    .btn-gold:hover { opacity: .85; }
    .btn-gold:disabled { opacity: .4; cursor: not-allowed; }

    #login-error {
      margin-top: 1rem;
      font-size: .8rem;
      color: var(--red);
      text-align: center;
      min-height: 1.2em;
    }

    /* ── MAIN PANEL ── */
    #panel { display: none; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .9rem 2rem;
      border-bottom: 1px solid var(--gold-dim);
      background: var(--bg2);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      letter-spacing: .2em;
      color: var(--gold);
    }

    .topbar-right {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    #status-msg {
      font-size: .75rem;
      letter-spacing: .08em;
      color: var(--text-dim);
      min-width: 10ch;
      text-align: right;
    }

    #status-msg.ok { color: #7dbf7d; }
    #status-msg.err { color: var(--red); }

    .btn-outline {
      padding: .5rem 1.2rem;
      background: transparent;
      border: 1px solid var(--gold-dim);
      color: var(--gold);
      font-family: 'Jost', sans-serif;
      font-size: .72rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }

    .btn-outline:hover { border-color: var(--gold); }

    .btn-save {
      padding: .5rem 1.5rem;
      background: var(--gold);
      color: var(--bg);
      font-family: 'Jost', sans-serif;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: opacity .2s;
    }

    .btn-save:hover { opacity: .85; }
    .btn-save:disabled { opacity: .4; cursor: not-allowed; }

    .content { max-width: 900px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }

    .content-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 300;
      letter-spacing: .15em;
      color: var(--gold);
      margin-bottom: .4rem;
    }

    .content-hint {
      font-size: .75rem;
      letter-spacing: .08em;
      color: var(--text-dim);
      margin-bottom: 2.5rem;
    }

    /* ── KATEGORIA BLOCK ── */
    .kat-block {
      margin-bottom: 2rem;
      border: 1px solid var(--gold-dim);
    }

    .kat-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: .8rem 1.2rem;
      background: rgba(201,168,76,.05);
      border-bottom: 1px solid var(--gold-dim);
      cursor: pointer;
      user-select: none;
    }

    .kat-header:hover { background: rgba(201,168,76,.08); }

    .kat-arrow {
      color: var(--gold);
      font-size: .7rem;
      transition: transform .2s;
      flex-shrink: 0;
    }

    .kat-block.collapsed .kat-arrow { transform: rotate(-90deg); }

    .kat-name-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid transparent;
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: .85rem;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      width: 100%;
      outline: none;
      transition: border-color .2s;
      cursor: text;
    }

    .kat-name-input:focus {
      border-bottom-color: var(--gold);
      background: rgba(201,168,76,.04);
    }

    .kat-name-input:hover { border-bottom-color: var(--gold-dim); }

    .kat-body { padding: 0; }
    .kat-block.collapsed .kat-body { display: none; }

    table.ztab {
      width: 100%;
      border-collapse: collapse;
    }

    table.ztab thead tr {
      border-bottom: 1px solid var(--gold-dim);
    }

    table.ztab th {
      padding: .6rem 1.2rem;
      text-align: left;
      font-size: .65rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 400;
    }

    table.ztab th:last-child { width: 130px; }

    table.ztab td {
      padding: 0;
      border-bottom: 1px solid rgba(184,134,11,.12);
    }

    table.ztab tr:last-child td { border-bottom: none; }

    table.ztab tr:hover td { background: rgba(201,168,76,.03); }

    .cell-input {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: .87rem;
      font-weight: 300;
      padding: .75rem 1.2rem;
      outline: none;
      transition: background .15s;
    }

    .cell-input:focus {
      background: rgba(201,168,76,.07);
    }

    td.td-cena .cell-input {
      color: var(--gold);
      font-weight: 400;
    }

    td.td-del {
      width: 40px;
      text-align: center;
      padding: 0 .5rem;
    }

    .btn-del {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: .4rem;
      transition: color .15s;
    }

    .btn-del:hover { color: var(--red); }

    .add-row-btn {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .6rem 1.2rem;
      border-top: 1px solid rgba(184,134,11,.12);
      background: none;
      color: var(--text-dim);
      font-family: 'Jost', sans-serif;
      font-size: .75rem;
      letter-spacing: .08em;
      cursor: pointer;
      width: 100%;
      transition: color .2s, background .2s;
      border: none;
      border-top: 1px solid rgba(184,134,11,.12);
    }

    .add-row-btn:hover { color: var(--gold); background: rgba(201,168,76,.04); }

    .spinner {
      display: inline-block;
      width: .9em;
      height: .9em;
      border: 2px solid rgba(201,168,76,.3);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">ALGO</div>
    <div class="login-sub">Panel Administratora</div>
    <label for="pat-input">GitHub Personal Access Token</label>
    <input type="password" id="pat-input" placeholder="ghp_..." autocomplete="off" />
    <button class="btn-gold" id="login-btn">Zaloguj</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- MAIN PANEL -->
<div id="panel">
  <div class="topbar">
    <div class="topbar-logo">ALGO</div>
    <div class="topbar-right">
      <span id="status-msg"></span>
      <button class="btn-outline" id="logout-btn">Wyloguj</button>
      <button class="btn-save" id="save-btn">Zapisz cennik</button>
    </div>
  </div>
  <div class="content">
    <div class="content-title">Cennik</div>
    <div class="content-hint">Kliknij w nazwę lub cenę, aby edytować. Zmiany zapisz przyciskiem w górnym pasku.</div>
    <div id="editor"></div>
  </div>
</div>

<script>
const REPO = 'lesniakcontact/algo';
const FILE = 'cennik.json';
const API  = `https://api.github.com/repos/${REPO}/contents/${FILE}`;

let PAT = '';
let fileSHA = '';
let data = null; // { kategorie: [...] }

// ── UTILS ──────────────────────────────────────────────────────────────────

function b64Encode(str) {
  return btoa(unescape(encodeURIComponent(str)));
}

function b64Decode(str) {
  return decodeURIComponent(escape(atob(str)));
}

function setStatus(msg, type = '') {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = type;
}

// ── AUTH ───────────────────────────────────────────────────────────────────

async function fetchCennik(pat) {
  const res = await fetch(API, {
    headers: { Authorization: `Bearer ${pat}`, Accept: 'application/vnd.github+json' }
  });
  if (!res.ok) throw new Error(`GitHub API ${res.status}`);
  const json = await res.json();
  fileSHA = json.sha;
  return JSON.parse(b64Decode(json.content.replace(/\n/g, '')));
}

async function saveCennik(pat, dataObj) {
  const content = b64Encode(JSON.stringify(dataObj, null, 2));
  const res = await fetch(API, {
    method: 'PUT',
    headers: {
      Authorization: `Bearer ${pat}`,
      Accept: 'application/vnd.github+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      message: 'Aktualizacja cennika',
      content,
      sha: fileSHA
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `GitHub API ${res.status}`);
  }
  const json = await res.json();
  fileSHA = json.content.sha;
}

// ── LOGIN FLOW ─────────────────────────────────────────────────────────────

document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('pat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const pat = document.getElementById('pat-input').value.trim();
  if (!pat) return;
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  try {
    data = await fetchCennik(pat);
    PAT = pat;
    localStorage.setItem('algo_pat', pat);
    showPanel();
  } catch (e) {
    errEl.textContent = `Błąd: ${e.message}`;
    btn.disabled = false;
    btn.textContent = 'Zaloguj';
  }
}

document.getElementById('logout-btn').addEventListener('click', () => {
  localStorage.removeItem('algo_pat');
  PAT = '';
  data = null;
  fileSHA = '';
  document.getElementById('pat-input').value = '';
  document.getElementById('login-error').textContent = '';
  document.getElementById('panel').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
});

// Auto-login from localStorage
window.addEventListener('DOMContentLoaded', async () => {
  const saved = localStorage.getItem('algo_pat');
  if (saved) {
    document.getElementById('pat-input').value = saved;
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';
    try {
      data = await fetchCennik(saved);
      PAT = saved;
      showPanel();
    } catch {
      localStorage.removeItem('algo_pat');
      btn.disabled = false;
      btn.textContent = 'Zaloguj';
    }
  }
});

// ── RENDER EDITOR ──────────────────────────────────────────────────────────

function showPanel() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('panel').style.display = 'block';
  renderEditor();
}

function renderEditor() {
  const root = document.getElementById('editor');
  root.innerHTML = '';
  data.kategorie.forEach((kat, ki) => {
    root.appendChild(buildKatBlock(kat, ki));
  });
}

function buildKatBlock(kat, ki) {
  const block = document.createElement('div');
  block.className = 'kat-block';
  block.dataset.ki = ki;

  // Header
  const header = document.createElement('div');
  header.className = 'kat-header';

  const arrow = document.createElement('span');
  arrow.className = 'kat-arrow';
  arrow.textContent = '▼';

  const nameInput = document.createElement('input');
  nameInput.type = 'text';
  nameInput.className = 'kat-name-input';
  nameInput.value = kat.nazwa;
  nameInput.addEventListener('click', e => e.stopPropagation());
  nameInput.addEventListener('change', () => {
    data.kategorie[ki].nazwa = nameInput.value;
  });

  header.append(arrow, nameInput);
  header.addEventListener('click', () => {
    block.classList.toggle('collapsed');
  });

  // Body
  const body = document.createElement('div');
  body.className = 'kat-body';

  const table = document.createElement('table');
  table.className = 'ztab';
  table.innerHTML = `<thead><tr>
    <th>${kat.naglowek || 'Zabieg'}</th>
    <th>Cena od</th>
    <th></th>
  </tr></thead>`;

  const tbody = document.createElement('tbody');
  kat.zabiegi.forEach((z, zi) => {
    tbody.appendChild(buildRow(kat, ki, zi));
  });
  table.appendChild(tbody);

  const addBtn = document.createElement('button');
  addBtn.className = 'add-row-btn';
  addBtn.textContent = '+ Dodaj zabieg';
  addBtn.addEventListener('click', () => {
    data.kategorie[ki].zabiegi.push({ nazwa: 'Nowy zabieg', cena: '—' });
    const zi = data.kategorie[ki].zabiegi.length - 1;
    const row = buildRow(data.kategorie[ki], ki, zi);
    tbody.appendChild(row);
    row.querySelector('.cell-input').focus();
    row.querySelector('.cell-input').select();
  });

  body.append(table, addBtn);
  block.append(header, body);
  return block;
}

function buildRow(kat, ki, zi) {
  const tr = document.createElement('tr');

  const tdNazwa = document.createElement('td');
  const inNazwa = document.createElement('input');
  inNazwa.type = 'text';
  inNazwa.className = 'cell-input';
  inNazwa.value = kat.zabiegi[zi].nazwa;
  inNazwa.addEventListener('change', () => {
    data.kategorie[ki].zabiegi[zi].nazwa = inNazwa.value;
  });
  tdNazwa.appendChild(inNazwa);

  const tdCena = document.createElement('td');
  tdCena.className = 'td-cena';
  const inCena = document.createElement('input');
  inCena.type = 'text';
  inCena.className = 'cell-input';
  inCena.value = kat.zabiegi[zi].cena;
  inCena.addEventListener('change', () => {
    data.kategorie[ki].zabiegi[zi].cena = inCena.value;
  });
  tdCena.appendChild(inCena);

  const tdDel = document.createElement('td');
  tdDel.className = 'td-del';
  const btnDel = document.createElement('button');
  btnDel.className = 'btn-del';
  btnDel.title = 'Usuń';
  btnDel.textContent = '×';
  btnDel.addEventListener('click', () => {
    data.kategorie[ki].zabiegi.splice(zi, 1);
    // Re-index: re-render entire editor (simplest, fast enough)
    renderEditor();
  });
  tdDel.appendChild(btnDel);

  tr.append(tdNazwa, tdCena, tdDel);
  return tr;
}

// ── SAVE ───────────────────────────────────────────────────────────────────

document.getElementById('save-btn').addEventListener('click', async () => {
  // Flush any active input values
  document.activeElement?.blur();

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Zapisywanie…';
  setStatus('');

  try {
    await saveCennik(PAT, data);
    setStatus('Zapisano ✓', 'ok');
    btn.textContent = 'Zapisz cennik';
    btn.disabled = false;
    setTimeout(() => setStatus(''), 4000);
  } catch (e) {
    setStatus(`Błąd: ${e.message}`, 'err');
    btn.textContent = 'Zapisz cennik';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
