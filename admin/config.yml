backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "cennik"
    label: "Cennik zabiegów"
    files:
      - label: "Cennik"
        name: "cennik"
        file: "cennik.json"
        format: json
        fields:
          - label: "Kategorie"
            name: "kategorie"
            widget: "list"
            label_singular: "Kategorię"
            allow_add: false
            collapsed: false
            summary: "{{fields.nazwa}}"
            fields:
              - name: "id"
                widget: "hidden"
              - name: "naglowek"
                widget: "hidden"
              - label: "Nazwa zakładki"
                name: "nazwa"
                widget: "string"
              - label: "Zabiegi"
                name: "zabiegi"
                widget: "list"
                label_singular: "Zabieg"
                allow_add: true
                collapsed: true
                summary: "{{fields.nazwa}} — {{fields.cena}}"
                fields:
                  - label: "Nazwa zabiegu"
                    name: "nazwa"
                    widget: "string"
                  - label: "Cena"
                    name: "cena"
                    widget: "string"
                    hint: "np. od 150 zł lub 150–250 zł"
